<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO — Geometric Wireframe Visualizer</title>
    <meta name="description" content="GEO is an open-source 3D wireframe pre-visualization engine for AI-generated CAD designs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- Left Sidebar (Parameters, Source Code, Version History, AI Prompt) -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="logo">
                    <svg class="logo-mark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                        <line x1="12" y1="22" x2="12" y2="15.5"/>
                        <polyline points="22 8.5 12 15.5 2 8.5"/>
                        <polyline points="2 15.5 12 8.5 22 15.5"/>
                        <line x1="12" y1="2" x2="12" y2="8.5"/>
                    </svg>
                    <div class="logo-label">
                        <span class="logo-text">GEO</span>
                        <span class="logo-sub">Wireframe Visualizer</span>
                    </div>
                </div>
                <div class="status-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-label">Offline</span>
                </div>
            </header>

            <!-- Parameters -->
            <section class="panel panel-params">
                <div class="panel-header">
                    <h3>Parameters</h3>
                    <button id="btn-share-design" class="icon-btn" title="Share Design"><i class="fa-solid fa-share-nodes"></i></button>
                </div>
                <div class="params-list" id="params-container">
                    <div class="empty-state">No model loaded</div>
                </div>
            </section>

            <!-- JSON Inspector (Source Code) -->
            <section class="panel panel-code" id="panel-code">
                <div class="panel-header" id="header-code">
                    <h3><i class="fa-solid fa-chevron-down panel-toggle-icon"></i> Source Code</h3>
                    <button id="btn-copy-code" class="icon-btn" title="Copy JSON"><i class="fa-regular fa-copy"></i></button>
                </div>
                <div class="code-wrapper">
                    <textarea id="json-viewer" readonly spellcheck="false" placeholder="geometri JSON source code will appear here..."></textarea>
                </div>
            </section>

            <!-- Versions Panel (Version History) -->
            <section class="panel panel-versions" id="versions-panel">
                <div class="panel-header" id="header-versions">
                    <h3><i class="fa-solid fa-chevron-down panel-toggle-icon"></i> Version History</h3>
                    <button id="btn-clear-versions" class="icon-btn" title="Clear all"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <div class="versions-list" id="versions-list">
                    <!-- Version entries injected dynamically -->
                </div>
            </section>

            <!-- Footer -->
            <footer class="sidebar-footer">
                <button id="btn-copy-prompt" class="footer-btn">
                    <i class="fa-solid fa-microchip"></i>
                    <span>Copy AI System Prompt</span>
                </button>
            </footer>
        </aside>

        <!-- Main Area (tab bar + viewport) -->
        <div class="main-area">

            <!-- Horizontal Tab Bar -->
            <div class="tab-bar" id="tab-bar">
                <div class="tab-bar-left">
                    <button class="tab-bar-toggle" id="btn-toggle-versions" title="Toggle versions panel">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </button>
                    <div class="tabs-scroll" id="tabs-container">
                        <!-- Horizontal tabs injected dynamically -->
                    </div>
                </div>
            </div>

            <!-- Viewport -->
            <div class="viewport" id="viewport">
                <div id="canvas-container"></div>

                <!-- Axis Labels -->
                <div class="axis-label axis-x" id="axis-label-x">X</div>
                <div class="axis-label axis-y" id="axis-label-y">Y</div>
                <div class="axis-label axis-z" id="axis-label-z">Z</div>

                <!-- Toolbar (left edge, vertical) -->
                <div class="toolbar" id="toolbar">
                    <button id="ctrl-grid" class="toolbar-btn active" data-tooltip="Grid">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    </button>
                    <button id="ctrl-axes" class="toolbar-btn active" data-tooltip="Axes">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><polyline points="8 6 12 2 16 6"/><polyline points="18 8 22 12 18 16"/></svg>
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="ctrl-camera" class="toolbar-btn" data-tooltip="Reset View">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/><line x1="12" y1="1" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="1" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="23" y2="12"/></svg>
                    </button>
                    <button id="ctrl-ortho" class="toolbar-btn" data-tooltip="Ortho / Perspective">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12L12 2l10 10-10 10z"/></svg>
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="ctrl-theme" class="toolbar-btn" data-tooltip="Toggle Theme">
                        <i class="fa-solid fa-circle-half-stroke" style="font-size:14px"></i>
                    </button>
                    <button id="ctrl-capture" class="toolbar-btn" data-tooltip="Capture Viewport">
                        <i class="fa-solid fa-camera" style="font-size:14px"></i>
                    </button>
                </div>

                <!-- HUD (top right) -->
                <div class="hud" id="hud">
                    <div class="hud-cell"><span class="hud-key">V</span><span class="hud-val" id="info-vertices">0</span></div>
                    <div class="hud-sep"></div>
                    <div class="hud-cell"><span class="hud-key">P</span><span class="hud-val" id="info-primitives">0</span></div>
                    <div class="hud-sep"></div>
                    <div class="hud-cell"><span class="hud-key">Bounds</span><span class="hud-val" id="info-bounds">—</span></div>
                </div>

                <!-- Coordinate readout (bottom left) -->
                <div class="coord-readout" id="coord-readout">
                    <span class="coord-item"><span class="coord-axis cx">X</span> <span id="coord-x">0.00</span></span>
                    <span class="coord-item"><span class="coord-axis cy">Y</span> <span id="coord-y">0.00</span></span>
                    <span class="coord-item"><span class="coord-axis cz">Z</span> <span id="coord-z">0.00</span></span>
                </div>

                <!-- Onboarding -->
                <div class="onboarding" id="onboarding-view">
                    <div class="onboarding-card">
                        <svg class="onboarding-logo" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
                            <line x1="12" y1="22" x2="12" y2="15.5"/>
                            <polyline points="22 8.5 12 15.5 2 8.5"/>
                            <polyline points="2 15.5 12 8.5 22 15.5"/>
                            <line x1="12" y1="2" x2="12" y2="8.5"/>
                        </svg>
                        <h2>GEO</h2>
                        <p>Lightweight 3D wireframe pre-visualization<br>for AI-generated geometric models.</p>
                        <div class="onboarding-buttons" style="display: flex; gap: 12px; margin-top: 8px;">
                            <button id="btn-load-demo" class="primary-btn">Load Demo</button>
                            <button id="btn-load-gears" class="primary-btn" style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text);">Load 3D Gears</button>
                        </div>
                    </div>
                </div>

                <!-- Toast area -->
                <div class="toast-container" id="toast-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="examples.js"></script>
    <script src="app.js"></script>
</body>
</html>
